<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="근태관리" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>근태관리 시스템</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192x192.png" />
  <link rel="stylesheet" href="./css/style.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0a0a0f;
    }
    .splash {
      text-align: center;
      animation: fadeInUp 0.5s ease;
    }
    .splash__logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #6c63ff, #00d4aa);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin: 0 auto 20px;
      box-shadow: 0 16px 48px rgba(108,99,255,0.4);
    }
    .splash__title {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: #f0f0f8;
      letter-spacing: -0.5px;
    }
    .splash__sub {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      color: #55556a;
      margin-top: 8px;
    }
    .splash__spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid rgba(108,99,255,0.2);
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 28px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;800&display=swap');
  </style>
</head>
<body>
  <div class="splash">
    <div class="splash__logo">⏱</div>
    <div class="splash__title">근태관리 시스템</div>
    <div class="splash__sub">세션을 확인하는 중...</div>
    <div class="splash__spinner"></div>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/app.js"></script>
  <script>
    (async function () {
      // app.js 로드 후 세션 체크하여 적절한 페이지로 리다이렉트
      // SDK 로드 타이밍 보장
      await new Promise(resolve => setTimeout(resolve, 150));

      if (!window.supabaseClient) {
        // Supabase 초기화 실패 → 로그인 페이지로
        window.location.replace('/login.html');
        return;
      }

      try {
        const result = await window.getSessionAndProfile();

        if (!result) {
          window.location.replace('/login.html');
          return;
        }

        const { profile } = result;

        if (profile.role === 'admin') {
          window.location.replace('/admin.html');
        } else {
          window.location.replace('/worker.html');
        }
      } catch (e) {
        console.error('[index] 라우팅 오류:', e);
        window.location.replace('/login.html');
      }
    })();
  </script>
</body>
</html>
