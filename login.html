<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="mobile-web-app-capable" content="yes">
  <title>로그인 — 근태관리</title>

  <link rel="stylesheet" href="./css/style.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "YOUR_SUPABASE_URL";
    const supabaseKey = "YOUR_SUPABASE_ANON_KEY";
    window.supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
  </script>
</head>

<body>

<div class="login-page">

  <!-- LOGIN -->
  <div class="login-section">
    <h2>로그인</h2>

    <input id="login-email" type="email" placeholder="이메일" />
    <input id="login-password" type="password" placeholder="비밀번호" />

    <button id="btn-login">로그인</button>
    <div id="login-error" style="color:red;"></div>
  </div>

  <hr />

  <!-- SIGNUP -->
  <div class="login-section">
    <h2>회원가입</h2>

    <input id="signup-name" type="text" placeholder="이름" />
    <input id="signup-email" type="email" placeholder="이메일" />
    <input id="signup-password" type="password" placeholder="비밀번호 (6자 이상)" />

    <select id="signup-role">
      <option value="worker">근무자</option>
      <option value="admin">관리자</option>
    </select>

    <button id="btn-signup">회원가입</button>
    <div id="signup-error" style="color:red;"></div>
    <div id="signup-success" style="color:green;"></div>
  </div>

</div>

<script>
const $ = (id) => document.getElementById(id);

/* ---------------- LOGIN ---------------- */
$("btn-login").addEventListener("click", async () => {
  $("login-error").textContent = "";

  const email = $("login-email").value.trim();
  const password = $("login-password").value;

  if (!email || !password) {
    $("login-error").textContent = "이메일/비밀번호 입력";
    return;
  }

  const { data, error } = await window.supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    $("login-error").textContent = error.message;
    return;
  }

  const user = data.user;

  const { data: profile, error: profileErr } = await window.supabaseClient
    .from("users")
    .select("role, name")
    .eq("id", user.id)
    .single();

  if (profileErr || !profile) {
    $("login-error").textContent = "프로필 없음 (회원가입 필요)";
    return;
  }

  if (profile.role === "admin") {
    window.location.href = "/admin.html";
  } else {
    window.location.href = "/worker.html";
  }
});


/* ---------------- SIGNUP ---------------- */
$("btn-signup").addEventListener("click", async () => {
  $("signup-error").textContent = "";
  $("signup-success").textContent = "";

  const name = $("signup-name").value.trim();
  const email = $("signup-email").value.trim();
  const password = $("signup-password").value;
  const role = $("signup-role").value;

  if (!name || !email || password.length < 6) {
    $("signup-error").textContent = "입력값 확인";
    return;
  }

  const { data, error } = await window.supabaseClient.auth.signUp({
    email,
    password
  });

  if (error) {
    $("signup-error").textContent = error.message;
    return;
  }

  const user = data.user;

  const { error: insertErr } = await window.supabaseClient
    .from("users")
    .insert([
      {
        id: user.id,
        email,
        name,
        role
      }
    ]);

  if (insertErr) {
    $("signup-error").textContent = insertErr.message;
    return;
  }

  $("signup-success").textContent = "회원가입 완료! 로그인하세요.";
});
</script>

</body>
</html>
